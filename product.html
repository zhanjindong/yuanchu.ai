<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品 - 元初AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .content {
            position: relative;
            z-index: 1;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .back {
            display: inline-block;
            font-size: 14px;
            color: rgba(0,0,0,0.4);
            text-decoration: none;
            letter-spacing: 4px;
            margin-bottom: 60px;
            transition: color 0.3s;
        }
        .back:hover { color: #1a1a1a; }
        .back::before { content: '← '; }
        .section-title {
            font-size: 14px;
            color: rgba(0,0,0,0.4);
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 60px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }
        .product-item {
            padding: 40px;
            border: 1px solid rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .product-item:hover {
            border-color: rgba(0,0,0,0.3);
            transform: translateY(-5px);
        }
        .product-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .product-item h3 {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 15px;
        }
        .product-item p {
            font-size: 14px;
            color: rgba(0,0,0,0.5);
            line-height: 1.8;
        }
        a.product-item {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        footer {
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid rgba(0,0,0,0.1);
            text-align: center;
            font-size: 12px;
            color: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="content">
        <a href="index.html" class="back">BACK</a>
        <div class="section-title">PRODUCTS</div>
        <h1>产品</h1>
        <div class="products">
            <a href="https://agent.yuanchu.ai" class="product-item">
                <div class="product-icon">🧠</div>
                <h3>OpenTeam</h3>
                <p>智能对话助手，理解自然语言，提供专业解答与创意支持。</p>
            </a>
            <div class="product-item">
                <div class="product-icon">⚡</div>
                <h3>代码引擎</h3>
                <p>AI编程助手，自动生成代码、调试优化、提升开发效率。</p>
            </div>
            <div class="product-item">
                <div class="product-icon">📊</div>
                <h3>数据分析</h3>
                <p>智能数据处理，自动分析、可视化、洞察业务价值。</p>
            </div>
            <div class="product-item">
                <div class="product-icon">🔒</div>
                <h3>安全卫士</h3>
                <p>AI安全防护，实时监测、智能预警、保障数字资产。</p>
            </div>
            <a href="https://skills.yuanchu.ai" class="product-item">
                <div class="product-icon">🛒</div>
                <h3>Skills Market</h3>
                <p>AI 技能集市，发现和下载 AI Skills，让你的 Agent 更强大。</p>
            </a>
        </div>
        <footer>
            <p>© 2026 元初AI · ORIGIN OF INTELLIGENCE</p>
        </footer>
    </div>
    <script defer src="/tracker.js"></script>
</body>
</html>
