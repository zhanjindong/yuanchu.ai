<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Berry's Speech Practice - Spring Festival</title>
<style>
:root {
  --primary: #FF6B6B;
  --primary-light: #FFE0E0;
  --accent: #4ECDC4;
  --accent-light: #E0FAF7;
  --yellow: #FFE66D;
  --yellow-light: #FFF8D6;
  --bg: #FFF9F0;
  --text: #2D3436;
  --text-light: #636E72;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: 0 auto;
}

/* Header */
.header {
  text-align: center;
  padding: 30px 20px;
  background: linear-gradient(135deg, var(--primary), #FF8E8E);
  border-radius: var(--radius);
  color: white;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '🎤';
  position: absolute;
  font-size: 80px;
  opacity: 0.15;
  top: -10px;
  right: 10px;
}
.header h1 {
  font-size: 28px;
  margin-bottom: 8px;
}
.header p {
  font-size: 15px;
  opacity: 0.9;
}

/* Full play bar */
.full-play-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  background: white;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.full-play-bar .play-full-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  font-size: 22px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s, background 0.2s;
}
.full-play-bar .play-full-btn:hover { transform: scale(1.1); }
.full-play-bar .play-full-btn.playing { background: var(--accent); }
.full-play-bar .info {
  flex: 1;
}
.full-play-bar .info .label {
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 2px;
}
.full-play-bar .info .sub {
  font-size: 13px;
  color: var(--text-light);
}
.progress-bar {
  width: 100%;
  height: 6px;
  background: #eee;
  border-radius: 3px;
  margin-top: 8px;
  overflow: hidden;
}
.progress-bar .progress {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  width: 0%;
  transition: width 0.3s;
}

/* Mode tabs */
.mode-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.mode-tab {
  flex: 1;
  padding: 12px;
  border: 2px solid #eee;
  border-radius: 12px;
  background: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.mode-tab.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.mode-tab:hover:not(.active) {
  border-color: #ccc;
}

/* Line cards */
.line-card {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  transition: all 0.3s;
  border-left: 4px solid transparent;
}
.line-card.active {
  border-left-color: var(--primary);
  box-shadow: 0 4px 24px rgba(255,107,107,0.15);
}
.line-card.completed {
  border-left-color: var(--accent);
}
.line-number {
  display: inline-block;
  background: var(--yellow-light);
  color: #E17055;
  font-weight: 700;
  font-size: 13px;
  padding: 2px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}
.line-text {
  font-size: 18px;
  line-height: 1.6;
  margin-bottom: 14px;
  font-weight: 500;
}
.line-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }

.btn-listen {
  background: var(--primary-light);
  color: var(--primary);
}
.btn-listen.playing {
  background: var(--primary);
  color: white;
}
.btn-record {
  background: var(--accent-light);
  color: var(--accent);
}
.btn-record.recording {
  background: #FF4757;
  color: white;
  animation: pulse 1s infinite;
}
.btn-playback {
  background: var(--yellow-light);
  color: #E17055;
}
.btn-playback:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(255,71,87,0); }
}

/* Recording indicator */
.recording-time {
  font-size: 13px;
  color: #FF4757;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* Score badge */
.score-badge {
  display: none;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  background: var(--accent-light);
  color: var(--accent);
}
.score-badge.show { display: inline-block; }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.stat {
  flex: 1;
  background: white;
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
}
.stat-label {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

/* Tips */
.tips {
  background: var(--yellow-light);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: 14px;
  line-height: 1.8;
  color: #856404;
}
.tips strong { color: #E17055; }

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  color: var(--text-light);
  font-size: 13px;
}

/* Touch optimization */
.btn, .play-full-btn, .mode-tab {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}

/* Responsive - Tablet */
@media (max-width: 600px) {
  body { padding: 16px; }
  .header { padding: 24px 16px; }
  .header h1 { font-size: 24px; }
  .line-text { font-size: 17px; }
}

/* Responsive - Phone */
@media (max-width: 480px) {
  body { padding: 12px; }
  .header { padding: 20px 14px; margin-bottom: 16px; }
  .header h1 { font-size: 21px; }
  .header p { font-size: 13px; }
  .header::before { font-size: 50px; }

  .full-play-bar { padding: 12px 14px; gap: 10px; margin-bottom: 16px; }
  .full-play-bar .play-full-btn { width: 46px; height: 46px; font-size: 20px; }
  .full-play-bar .info .label { font-size: 15px; }
  .progress-bar { height: 8px; }

  .stats-bar { gap: 6px; margin-bottom: 16px; }
  .stat { padding: 10px 6px; border-radius: 10px; }
  .stat-value { font-size: 20px; }
  .stat-label { font-size: 11px; }

  .tips { padding: 12px 14px; font-size: 13px; margin-bottom: 16px; }

  .line-card { padding: 14px; margin-bottom: 10px; border-radius: 12px; }
  .line-text { font-size: 16px; line-height: 1.5; margin-bottom: 12px; }
  .line-number { font-size: 12px; padding: 2px 8px; margin-bottom: 8px; }

  /* Buttons: full width row, bigger touch targets */
  .line-actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .btn {
    padding: 10px 8px;
    font-size: 13px;
    border-radius: 8px;
    justify-content: center;
    min-height: 44px;
  }
  .recording-time {
    grid-column: 1 / -1;
    text-align: center;
  }
  .score-badge {
    grid-column: 1 / -1;
    text-align: center;
  }
}

/* Responsive - Small phone (SE, mini) */
@media (max-width: 375px) {
  .header h1 { font-size: 19px; }
  .line-text { font-size: 15px; }
  .btn { padding: 10px 6px; font-size: 12px; gap: 3px; }
  .stat-value { font-size: 18px; }

  .line-actions {
    grid-template-columns: 1fr 1fr;
  }
  .btn-playback {
    grid-column: 1 / -1;
  }
}

/* Safe area for notched phones */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  body {
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌸 Berry's Speech Practice</h1>
    <p>Spring Festival | 逐句跟读 & 录音练习</p>
  </div>

  <div class="full-play-bar">
    <button class="play-full-btn" id="playFullBtn" onclick="toggleFullPlay()">▶</button>
    <div class="info">
      <div class="label">完整播放</div>
      <div class="sub">先听一遍完整的范读</div>
      <div class="progress-bar"><div class="progress" id="fullProgress"></div></div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="listenCount">0</div>
      <div class="stat-label">已听次数</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="recordCount">0</div>
      <div class="stat-label">已录次数</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="completedCount">0/10</div>
      <div class="stat-label">完成进度</div>
    </div>
  </div>

  <div class="tips">
    <strong>练习步骤：</strong>
    ① 点击 <strong>🔊 听范读</strong> 听示范 →
    ② 点击 <strong>🎙 录音</strong> 跟读 →
    ③ 点击 <strong>🔁 回放</strong> 对比自己的发音
  </div>

  <div id="linesContainer"></div>

  <div class="footer">
    Made with ❤️ for Berry's English Practice
  </div>
</div>

<script src="berry-audio-data.js"></script>
<script>
// Speech lines
const lines = [
  "Hello everyone! My name is Berry. I'm 7 years old, I'm a boy.",
  "I love playing ping-pong, singing and drawing. I also like making friends very much!",
  'Today, my topic is "Spring Festival".',
  "Spring Festival is the Chinese New Year!",
  "Before the festival, my family and I clean house, put up red couplets, and buy new clothes.",
  "On New Year's Eve, We eat delicious food, and watch the Spring Festival Gala together.",
  'On New Year\'s Day, we say "Happy New Year" to each other.',
  "We are so happy!",
  "I love Spring Festival!",
  "Thank you!"
];

// Audio data will be loaded from embedded base64
// Audio data loaded from external file (berry-audio-data.js)


// State
let currentAudio = null;
let fullAudio = null;
let mediaRecorder = null;
let recordings = new Array(lines.length).fill(null);
let listenCount = 0;
let recordCount = 0;
let completedLines = new Set();

// Build line cards
const container = document.getElementById('linesContainer');
lines.forEach((text, i) => {
  const card = document.createElement('div');
  card.className = 'line-card';
  card.id = `card-${i}`;
  card.innerHTML = `
    <div class="line-number">Line ${i + 1}</div>
    <div class="line-text">${text}</div>
    <div class="line-actions">
      <button class="btn btn-listen" id="listenBtn-${i}" onclick="playLine(${i})">🔊 听范读</button>
      <button class="btn btn-record" id="recordBtn-${i}" onclick="toggleRecord(${i})">🎙 录音</button>
      <button class="btn btn-playback" id="playbackBtn-${i}" onclick="playRecording(${i})" disabled>🔁 回放</button>
      <span class="recording-time" id="recTime-${i}"></span>
      <span class="score-badge" id="badge-${i}">✓ 已练习</span>
    </div>
  `;
  container.appendChild(card);
});

// Play single line
function playLine(idx) {
  stopAll();
  const btn = document.getElementById(`listenBtn-${idx}`);
  const card = document.getElementById(`card-${idx}`);

  const audio = new Audio(audioData[idx]);
  currentAudio = audio;

  btn.classList.add('playing');
  btn.innerHTML = '⏸ 播放中';
  card.classList.add('active');

  audio.onended = () => {
    btn.classList.remove('playing');
    btn.innerHTML = '🔊 听范读';
    card.classList.remove('active');
    currentAudio = null;
  };

  audio.play();
  listenCount++;
  document.getElementById('listenCount').textContent = listenCount;
}

// Full play
function toggleFullPlay() {
  const btn = document.getElementById('playFullBtn');

  if (fullAudio && !fullAudio.paused) {
    fullAudio.pause();
    fullAudio.currentTime = 0;
    btn.classList.remove('playing');
    btn.innerHTML = '▶';
    document.getElementById('fullProgress').style.width = '0%';
    fullAudio = null;
    return;
  }

  stopAll();
  fullAudio = new Audio(fullAudioData);
  btn.classList.add('playing');
  btn.innerHTML = '⏸';

  fullAudio.ontimeupdate = () => {
    if (fullAudio && fullAudio.duration) {
      const pct = (fullAudio.currentTime / fullAudio.duration) * 100;
      document.getElementById('fullProgress').style.width = pct + '%';
    }
  };

  fullAudio.onended = () => {
    btn.classList.remove('playing');
    btn.innerHTML = '▶';
    document.getElementById('fullProgress').style.width = '100%';
    fullAudio = null;
  };

  fullAudio.play();
  listenCount++;
  document.getElementById('listenCount').textContent = listenCount;
}

// Recording
async function toggleRecord(idx) {
  const btn = document.getElementById(`recordBtn-${idx}`);
  const timeEl = document.getElementById(`recTime-${idx}`);

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  stopAll();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const chunks = [];
    mediaRecorder = new MediaRecorder(stream);
    let startTime = Date.now();

    const card = document.getElementById(`card-${idx}`);
    card.classList.add('active');
    btn.classList.add('recording');
    btn.innerHTML = '⏹ 停止';

    // Timer
    const timer = setInterval(() => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      timeEl.textContent = elapsed + 's';
    }, 100);

    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);

    mediaRecorder.onstop = () => {
      clearInterval(timer);
      stream.getTracks().forEach(t => t.stop());

      const blob = new Blob(chunks, { type: 'audio/webm' });
      recordings[idx] = URL.createObjectURL(blob);

      btn.classList.remove('recording');
      btn.innerHTML = '🎙 重录';
      card.classList.remove('active');
      card.classList.add('completed');

      const playbackBtn = document.getElementById(`playbackBtn-${idx}`);
      playbackBtn.disabled = false;

      const badge = document.getElementById(`badge-${idx}`);
      badge.classList.add('show');

      completedLines.add(idx);
      recordCount++;
      document.getElementById('recordCount').textContent = recordCount;
      document.getElementById('completedCount').textContent = completedLines.size + '/10';

      mediaRecorder = null;
    };

    mediaRecorder.start();
  } catch (err) {
    alert('请允许麦克风权限后重试 🎤');
    btn.classList.remove('recording');
    btn.innerHTML = '🎙 录音';
  }
}

// Play recording
function playRecording(idx) {
  if (!recordings[idx]) return;
  stopAll();

  const btn = document.getElementById(`playbackBtn-${idx}`);
  const audio = new Audio(recordings[idx]);
  currentAudio = audio;

  btn.style.background = '#FFE66D';
  audio.onended = () => {
    btn.style.background = '';
    currentAudio = null;
  };
  audio.play();
}

// Stop everything
function stopAll() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  if (fullAudio) {
    fullAudio.pause();
    fullAudio.currentTime = 0;
    document.getElementById('playFullBtn').classList.remove('playing');
    document.getElementById('playFullBtn').innerHTML = '▶';
    document.getElementById('fullProgress').style.width = '0%';
    fullAudio = null;
  }
  // Reset all listen buttons
  lines.forEach((_, i) => {
    const btn = document.getElementById(`listenBtn-${i}`);
    btn.classList.remove('playing');
    btn.innerHTML = '🔊 听范读';
  });
}
</script>
</body>
</html>
