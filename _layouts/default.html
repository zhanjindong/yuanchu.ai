<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - 元初AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .content {
            position: relative;
            z-index: 1;
            padding: 40px 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .back {
            display: inline-block;
            font-size: 14px;
            color: rgba(0,0,0,0.4);
            text-decoration: none;
            letter-spacing: 4px;
            margin-bottom: 60px;
            transition: color 0.3s;
        }
        .back:hover { color: #1a1a1a; }
        .back::before { content: '← '; }
        .article-header {
            margin-bottom: 50px;
        }
        .article-header .article-title {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 2px;
            line-height: 1.4;
            color: #1a1a1a;
            margin-bottom: 16px;
        }
        .article-header .article-meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: rgba(0,0,0,0.4);
        }
        .article-header .article-meta .author::before {
            content: '✎ ';
        }
        .article-header .article-meta .date::before {
            content: '⏱ ';
        }
        .article-content {
            line-height: 1.9;
            font-size: 16px;
            color: rgba(0,0,0,0.8);
        }
        .article-content h1 {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        .article-content h2 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-top: 50px;
            margin-bottom: 20px;
            color: rgba(0,0,0,0.9);
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .article-content h3 {
            font-size: 20px;
            font-weight: 400;
            margin-top: 35px;
            margin-bottom: 15px;
            color: rgba(0,0,0,0.85);
        }
        .article-content h4 {
            font-size: 17px;
            font-weight: 500;
            margin-top: 25px;
            margin-bottom: 10px;
            color: rgba(0,0,0,0.8);
        }
        .article-content p {
            margin-bottom: 16px;
        }
        .article-content a {
            color: #2563eb;
            text-decoration: none;
            border-bottom: 1px solid rgba(37,99,235,0.3);
            transition: border-color 0.3s;
        }
        .article-content a:hover {
            border-bottom-color: #2563eb;
        }
        .article-content blockquote {
            border-left: 3px solid rgba(0,0,0,0.2);
            padding: 10px 20px;
            margin: 20px 0;
            color: rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.03);
        }
        .article-content pre {
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 6px;
            padding: 20px;
            margin: 20px 0;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.6;
        }
        .article-content code {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 14px;
        }
        .article-content p code,
        .article-content li code {
            background: rgba(0,0,0,0.08);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .article-content ul, .article-content ol {
            padding-left: 24px;
            margin-bottom: 16px;
        }
        .article-content li {
            margin-bottom: 6px;
        }
        .article-content hr {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.1);
            margin: 40px 0;
        }
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }
        .article-content th,
        .article-content td {
            padding: 10px 14px;
            border: 1px solid rgba(0,0,0,0.1);
            text-align: left;
        }
        .article-content th {
            background: rgba(0,0,0,0.05);
            color: rgba(0,0,0,0.7);
            font-weight: 500;
        }
        .article-content td {
            color: rgba(0,0,0,0.6);
        }
        .article-content strong {
            color: rgba(0,0,0,0.95);
            font-weight: 600;
        }
        .article-content em {
            color: rgba(0,0,0,0.6);
        }
        /* Rouge syntax highlighting - GitHub-like theme */
        .highlight { background: #f6f8fa; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; padding: 16px; margin: 20px 0; overflow-x: auto; }
        .highlight pre { background: transparent; border: none; padding: 0; margin: 0; }
        .highlight .c, .highlight .cd, .highlight .cm, .highlight .c1, .highlight .cs { color: #6a737d; font-style: italic; } /* comments */
        .highlight .k, .highlight .kc, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt { color: #d73a49; font-weight: 600; } /* keywords */
        .highlight .s, .highlight .sb, .highlight .sc, .highlight .sd, .highlight .s2, .highlight .se, .highlight .sh, .highlight .si, .highlight .sx, .highlight .s1, .highlight .ss { color: #032f62; } /* strings */
        .highlight .n, .highlight .na, .highlight .nb, .highlight .nc, .highlight .nd, .highlight .ni, .highlight .ne, .highlight .nf, .highlight .nl, .highlight .nn, .highlight .no, .highlight .nt, .highlight .nv { color: #24292e; } /* names */
        .highlight .nc, .highlight .nd { color: #6f42c1; } /* class names, decorators */
        .highlight .nf, .highlight .fm { color: #6f42c1; } /* function names */
        .highlight .nt { color: #22863a; } /* tags */
        .highlight .na { color: #6f42c1; } /* attributes */
        .highlight .mi, .highlight .mf, .highlight .mh, .highlight .mo, .highlight .il { color: #005cc5; } /* numbers */
        .highlight .o, .highlight .ow { color: #d73a49; } /* operators */
        .highlight .p { color: #24292e; } /* punctuation */
        .highlight .gd { color: #b31d28; background: #ffeef0; } /* diff deleted */
        .highlight .gi { color: #22863a; background: #f0fff4; } /* diff inserted */
        .highlight .err { color: #b31d28; }
        footer {
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid rgba(0,0,0,0.1);
            text-align: center;
            font-size: 12px;
            color: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="content">
        <a href="{{ '/tech/index.html' | relative_url }}" class="back">BACK</a>
        {% if page.title %}
        <header class="article-header">
            <h1 class="article-title">{{ page.title }}</h1>
            <div class="article-meta">
                {% if page.author %}<span class="author">{{ page.author }}</span>{% endif %}
                {% if page.date %}<span class="date">{{ page.date | date: "%Y-%m-%d" }}</span>{% endif %}
            </div>
        </header>
        {% endif %}
        <div class="article-content">
            {{ content }}
        </div>
        <footer>
            <p>&copy; 2026 元初AI &middot; ORIGIN OF INTELLIGENCE</p>
        </footer>
    </div>
    <script defer src="/tracker.js"></script>
</body>
</html>
