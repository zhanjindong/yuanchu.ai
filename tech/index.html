<head>

    <title>技术文章 - 元初AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .content {
            position: relative;
            z-index: 1;
            padding: 40px 60px;
            max-width: 900px;
            margin: 0 auto;
        }
        .back {
            display: inline-block;
            font-size: 14px;
            color: rgba(0,0,0,0.4);
            text-decoration: none;
            letter-spacing: 4px;
            margin-bottom: 60px;
            transition: color 0.3s;
        }
        .back:hover { color: #1a1a1a; }
        .back::before { content: '← '; }
        .section-title {
            font-size: 14px;
            color: rgba(0,0,0,0.4);
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 60px;
        }
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .article-item {
            display: block;
            padding: 30px 0;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            text-decoration: none;
            transition: all 0.3s;
        }
        .article-item:first-child {
            border-top: 1px solid rgba(0,0,0,0.08);
        }
        .article-item:hover {
            padding-left: 20px;
            background: rgba(0,0,0,0.02);
        }
        .article-title {
            font-size: 20px;
            font-weight: 400;
            color: rgba(0,0,0,0.85);
            letter-spacing: 1px;
            margin-bottom: 12px;
            transition: color 0.3s;
        }
        .article-item:hover .article-title {
            color: #1a1a1a;
        }
        .article-meta {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: rgba(0,0,0,0.35);
        }
        .article-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        footer {
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid rgba(0,0,0,0.1);
            text-align: center;
            font-size: 12px;
            color: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="content">
        <a href="../index.html" class="back">BACK</a>
        <div class="section-title">TECH ARTICLES</div>
        <h1>技术文章</h1>

                <div class="article-meta">
                    <span>Yuna Cheng</span>
                    <span>2026-02-15</span>
                </div>
            </a>
            <a href="quickstart.html" class="article-item">
                <div class="article-title">OpenTeam 快速开始</div>

        <footer>
