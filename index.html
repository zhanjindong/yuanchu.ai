<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元初AI - YuanChu AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .logo {
            font-size: 20px;
            color: rgba(0,0,0,0.4);
            margin-bottom: 60px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        .title-link {
            text-decoration: none;
            color: inherit;
            display: inline-block;
        }
        .title-link:hover {
            opacity: 0.8;
        }
        .title-cn {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #1a1a1a 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .title-en {
            font-size: 14px;
            color: rgba(0,0,0,0.5);
            letter-spacing: 12px;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 16px;
            color: rgba(0,0,0,0.4);
            margin-bottom: 80px;
            max-width: 500px;
            text-align: center;
            line-height: 1.4;
        }
        .menu {
            display: flex;
            gap: 60px;
            margin-bottom: 100px;
        }
        .menu-item {
            font-size: 15px;
            color: rgba(0,0,0,0.6);
            text-decoration: none;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        .menu-item:hover {
            color: #1a1a1a;
        }
        .menu-item::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: #1a1a1a;
            transition: width 0.3s;
        }
        .menu-item:hover::after {
            width: 100%;
        }
        @media (max-width: 768px) {
            .title-cn {
                font-size: 24px;
                letter-spacing: 6px;
            }
            .menu {
                flex-direction: column;
                gap: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="logo">YuanChu AI</div>
        <div class="title">
            <a href="index.html" class="title-link">
                <div class="title-cn">始于元初，行致远处</div>
                <div class="title-en"></div>
            </a>
        </div>
        <p class="tagline">
            <span style="color: rgba(0,0,0,0.3)">From the beginning, To the beyond</span>
        </p>
        <nav class="menu">
            <a href="myths/index.html" class="menu-item">故事</a>
            <a href="https://agent.yuanchu.ai" class="menu-item">项目</a>
            <a href="tech/index.html" class="menu-item">技术</a>
            <a href="about.html" class="menu-item">关于</a>
        </nav>
    </div>
</body>
</html>
